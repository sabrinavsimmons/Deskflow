{% extends 'base.html' %}
{% block title %}New Ticket · DeskFlow{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">New Ticket</h1>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('new_ticket') }}">
        <div class="form-grid">
            <div class="form-group form-full">
                <label class="form-label">Title *</label>
                <input class="form-input" type="text" name="title" placeholder="Brief summary of the issue" required>
            </div>
            <div class="form-group form-full">
                <label class="form-label">Description *</label>
                <textarea class="form-input" name="description" rows="5" placeholder="Describe the issue in detail." required></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Priority</label>
                <select class="form-input" name="priority">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                    <option value="critical">Critical</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Category</label>
                <select class="form-input" name="category">
                    <option>Hardware</option>
                    <option>Software</option>
                    <option>Network</option>
                    <option>Access / Permissions</option>
                    <option>Email / Communication</option>
                    <option>Security</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Assignee</label>
                <input class="form-input" type="text" name="assignee" placeholder="Who is handling this?">
            </div>
            <div class="form-group">
                <label class="form-label">Requester</label>
                <input class="form-input" type="text" name="requester" placeholder="Who submitted this?">
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Submit Ticket</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
