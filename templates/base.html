<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DeskFlow{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="brand-name">DESKFLOW</span>
            <span class="brand-sub">IT Ticketing</span>
        </div>
        <div class="nav-links">
            <a href="{{ url_for('index') }}" class="nav-link">Dashboard</a>
            <a href="{{ url_for('new_ticket') }}" class="nav-link nav-link-primary">+ New Ticket</a>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <span>DeskFlow · Self-hosted IT Ticketing</span>
    </footer>
</body>
</html>
