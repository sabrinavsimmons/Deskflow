{% extends 'base.html' %}
{% block title %}Login · DeskFlow{% endblock %}

{% block content %}
<div style="max-width: 380px; margin: 60px auto;">
    <div class="form-card">
        <div style="text-align: center; margin-bottom: 24px;">
            <div style="font-size: 16px; font-weight: bold; letter-spacing: 0.1em; color: #e2e8f0;">DESKFLOW</div>
            <div style="font-size: 12px; color: #4a5568; margin-top: 4px;">Sign in to continue</div>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div style="background: #3d1515; color: #fc8181; padding: 8px 12px; border-radius: 4px; font-size: 13px; margin-bottom: 16px;">
            {{ messages[0] }}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group" style="margin-bottom: 14px;">
                <label class="form-label">Username</label>
                <input class="form-input" type="text" name="username" placeholder="Enter username" required autofocus>
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label class="form-label">Password</label>
                <input class="form-input" type="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
